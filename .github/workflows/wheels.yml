name: Wheels

permissions:
  contents: write

on:
  push:
    tags:
      - 'v*'

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Require tag/version identity
        run: python3 python/scripts/check_release_tag.py --ref "${GITHUB_REF}"

  build_wheels:
    needs: preflight
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Drop committed venv (not needed in CI)
        run: rm -rf .venv
        shell: bash
      - uses: pypa/cibuildwheel@v2.17.0
        env:
          CIBW_BUILD: cp38-* cp39-* cp310-* cp311-* cp312-*
          CIBW_SKIP: pp* *-musllinux*
          CIBW_ARCHS_MACOS: universal2
          CIBW_ENVIRONMENT: QUANT_ENABLE_PYBIND=ON QUANT_ENABLE_OPENMP=OFF
          CIBW_ENVIRONMENT_MACOS: QUANT_ENABLE_PYBIND=ON QUANT_ENABLE_OPENMP=OFF
          CIBW_ENVIRONMENT_WINDOWS: QUANT_ENABLE_PYBIND=ON QUANT_ENABLE_OPENMP=OFF
          CIBW_TEST_COMMAND: python "{project}/python/scripts/cibw_test_suite.py"
        with:
          package-dir: .
          output-dir: wheelhouse
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/*

  build_sdist:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Build and validate source distribution
        run: |
          python -m pip install --upgrade build
          python -m build --sdist --outdir dist
          python python/scripts/validate_sdist.py dist/*.tar.gz
          python -m pip wheel dist/*.tar.gz --no-deps --wheel-dir sdist-wheelhouse
          python -m pip install --force-reinstall sdist-wheelhouse/*.whl
          python python/scripts/cibw_test_suite.py
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
  publish_testpypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    env:
      TEST_PYPI_API_TOKEN: ${{ secrets.TEST_PYPI_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist
      - name: Validate and manifest complete release set
        run: |
          python -m pip install --upgrade twine
          python python/scripts/release_manifest.py \
            --source-commit "${GITHUB_SHA}" \
            --output release-metadata/release-manifest.json \
            dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: release-manifest
          path: release-metadata/release-manifest.json
      - name: Attach validated Python artifacts to GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*
            release-metadata/release-manifest.json
      - name: Publish to TestPyPI
        if: env.TEST_PYPI_API_TOKEN != ''
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ env.TEST_PYPI_API_TOKEN }}
        run: |
          python -m pip install --upgrade pip
          twine upload --repository-url https://test.pypi.org/legacy/ dist/*
