name: Docs Pages

on:
  push:
    branches: [master, main]
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Install Doxygen toolchain
        run: sudo apt-get update && sudo apt-get install -y doxygen graphviz
      - name: Generate docs
        run: doxygen Doxyfile
      - name: Copy coverage bundle
        if: ${{ hashFiles('docs/coverage/index.html') != '' }}
        run: |
          mkdir -p docs/html/coverage
          cp -R docs/coverage/. docs/html/coverage/
      - name: Copy published artifacts
        run: |
          mkdir -p docs/html/artifacts
          cp -R docs/artifacts/. docs/html/artifacts/
      - name: Create friendly doc aliases
        run: |
          declare -A alias_sources=(
            ["Results.html"]="md_docs_2Results.html Results_8md.html _results_8md.html"
            ["WRDS_Results.html"]="md_docs_2WRDS__Results.html WRDS__Results_8md.html _w_r_d_s___results_8md.html"
            ["README.html"]="md__r_e_a_d_m_e.html _r_e_a_d_m_e_8md.html"
            ["ValidationHighlights.html"]="md_docs_2ValidationHighlights.html _validationhighlights_8md.html"
          )
          for target in "${!alias_sources[@]}"; do
            for src in ${alias_sources[$target]}; do
              if [[ -f "docs/html/$src" ]]; then
                cp "docs/html/$src" "docs/html/$target"
                break
              fi
            done
          done
      - name: Inject base href for project Pages path
        env:
          DOCS_COMMIT: ${{ github.sha }}
        run: |
          python3 - <<'PY'
          import os
          from pathlib import Path
          import re

          root = Path("docs/html")
          if not root.exists():
              raise SystemExit("docs/html not found (run doxygen first)")
          pattern = re.compile(r"<head>", flags=re.IGNORECASE)
          image_without_alt = re.compile(
              r"<img(?![^>]*\balt=)([^>]*)>", flags=re.IGNORECASE
          )
          snippet = '<base href="/quant-pricer-cpp/">'
          commit = os.environ["DOCS_COMMIT"]
          banner = (
              '<div style="font:13px system-ui;padding:8px 16px;background:#0969da;'
              'color:white">Documentation build: '
              f'<a style="color:white" href="https://github.com/MateoBodon/'
              f'quant-pricer-cpp/commit/{commit}"><code>{commit[:12]}</code></a></div>'
          )
          body_pattern = re.compile(r"<body[^>]*>", flags=re.IGNORECASE)
          for html in root.rglob("*.html"):
              text = html.read_text(encoding="utf-8")
              if snippet not in text:
                  text, _ = pattern.subn(lambda m: f"{m.group(0)}\n  {snippet}", text, count=1)
              if "Documentation build:" not in text:
                  text, _ = body_pattern.subn(lambda m: f"{m.group(0)}\n{banner}", text, count=1)
              text = image_without_alt.sub(r'<img alt=""\1>', text)
              html.write_text(text, encoding="utf-8")
          PY
      - name: Disable Jekyll
        run: touch docs/html/.nojekyll
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
